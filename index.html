<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        h1 { margin-bottom: 1.5rem; font-size: 1.5rem; }
        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 1rem;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
        }
        button:hover { background: #4338ca; }
        .result {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #f0fdf4;
            border-radius: 8px;
            display: none;
        }
        .result a { color: #4f46e5; word-break: break-all; }
        .error {
            margin-top: 1rem;
            color: red;
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔗 URL Shortener</h1>
        <input type="url" id="urlInput" placeholder="Paste your long URL here..." />
        <button onclick="shorten()">Shorten URL</button>
        <div class="error" id="error">Something went wrong. Please try again.</div>
        <div class="result" id="result">
            <p>Your short URL:</p>
            <a id="shortUrl" href="#" target="_blank"></a>
            <br><br>
            <button onclick="copy()" style="background:#10b981">Copy</button>
        </div>
    </div>

    <script>
        const API_BASE = 'https://url-shortener-production-b2af.up.railway.app';

        async function shorten() {
            const url = document.getElementById('urlInput').value;
            const error = document.getElementById('error');
            const result = document.getElementById('result');
            error.style.display = 'none';
            result.style.display = 'none';

            if (!url) return;

            try {
                const response = await fetch(`${API_BASE}/api/url/shorten`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },

                    body: url

        function copy() {
            navigator.clipboard.writeText(document.getElementById('shortUrl').textContent);
        }
    </script>
</body>
</html>
